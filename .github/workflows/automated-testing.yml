name: Automated tests

on:
  push:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  AutomatedTesting:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"    
    - name: Install PETSc and petsc4py
      run: | 
        duda apt-get update
        sudo apt-get install -y petsc-dev
        python3 -m pip install petsc4py
    - name: Check petsc4py installation
      run: |
        which python3
        python3 -c "import petsc4py; print(petsc4py.__file__)"
    - name: Install pytest
      run: |        
        python3 -m pip install pytest 
    - name: Install PEDS package
      run: |        
        python3 -m pip install .
    - name: Run tests
      env:
          PYTEST_ADDOPTS: "--color=yes --disable-warnings"
      run: |                
        python3 -m pytest -v
    
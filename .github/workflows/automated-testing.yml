name: Automated tests

on:
  push:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  AutomatedTesting:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Setup anaconda and install PETSc/petsc4py
      run: |
        conda create --name petsc_sandbox
        conda activate petsc_sandbox
        conda install -c conda-forge petsc
        conda install -c conda-forge petsc4py 
    - name: Install pytest
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Install package and dependencies
      run: |
        python -m pip install .
    - name: Test with pytest
      env:
          PYTEST_ADDOPTS: "--color=yes --disable-warnings"
      run: |
        pytest -v
